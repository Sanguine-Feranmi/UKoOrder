<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- SEO Meta Tags -->
    <title>FoodApp - Order Food Online from Best UK Restaurants | Fast Delivery</title>
